name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: astral-sh/setup-uv@v6
      - run: npm ci
      - run: npm test

  ash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3.2.4
      - name: Run ASH scan
        run: ash --mode local --fail-on-findings
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-results
          path: .ash/
